  terms:
    title: Términos de Servicio
    last_updated: Última actualización
    intro:
      title: Disposiciones Generales
      text1: Bienvenido a Usput. Al usar este sitio web y servicios, aceptas estos
        términos de servicio en su totalidad.
      text2: El operador de este sitio web es Muhamed Isabegović, un empresario individual
        con sede en Austria.
      text3: Si no estás de acuerdo con estos términos, por favor no uses nuestro
        sitio web.
    service:
      title: Descripción del Servicio
      text1: 'Usput es una plataforma de descubrimiento y planificación de viajes
        que permite a los usuarios:'
      feature1: Explorar experiencias y lugares
      feature2: Crear planes de viaje personalizados
      feature3: Dejar reseñas y calificaciones
      feature4: Crear una cuenta de usuario para guardar permanentemente su perfil
      text2: El servicio es de uso gratuito. Nos reservamos el derecho de introducir
        funciones premium en el futuro.
    registration:
      title: Registro de Usuario
      text1: 'El registro es necesario para ciertas funciones. Al registrarte, garantizas
        que:'
      req1: Tienes al menos 16 años
      req2: Proporcionas información precisa
      req3: Mantienes tus credenciales de inicio de sesión confidenciales
      req4: Eres responsable de todas las actividades en tu cuenta
    content:
      title: Contenido del Usuario
      text1: 'Al publicar contenido (reseñas, calificaciones) en nuestra plataforma:'
      grant1: Nos otorgas una licencia no exclusiva para usar, mostrar y distribuir
        ese contenido
      grant2: Garantizas que tienes derecho a publicar ese contenido
      grant3: Garantizas que el contenido no infringe los derechos de terceros
      prohibited: 'Está prohibido publicar contenido que sea:'
      prohibited1: Ilegal, ofensivo o discriminatorio
      prohibited2: Falso o engañoso
      prohibited3: Spam o publicidad no solicitada
      prohibited4: Contenido que infringe derechos de autor
    ip:
      title: Propiedad Intelectual
      text1: Todo el contenido de este sitio web (incluidos textos, gráficos, logotipos,
        iconos, imágenes y software) es propiedad de Usput o de nuestros licenciantes
        y está protegido por las leyes de derechos de autor.
      text2: No está permitida la copia, distribución, modificación o creación de
        obras derivadas sin nuestro permiso expreso por escrito.
    disclaimer:
      title: Exención de Responsabilidad
      text1: El servicio se proporciona "tal cual" sin ninguna garantía, expresa o
        implícita.
      text2: 'No garantizamos:'
      item1: Disponibilidad ininterrumpida o segura del servicio
      item2: Exactitud o integridad de la información sobre lugares y experiencias
      item3: Que el servicio satisfaga tus necesidades específicas
      text3: Usa la información bajo tu propio riesgo. Siempre verifica la información
        con fuentes oficiales antes de viajar.
    liability:
      title: Limitación de Responsabilidad
      text1: 'En la medida máxima permitida por la ley, no somos responsables de:'
      item1: Daños indirectos, incidentales o consecuentes
      item2: Pérdida de datos o beneficios
      item3: Daños derivados del uso o la imposibilidad de usar el servicio
      text2: Esta limitación de responsabilidad no afecta tus derechos legales como
        consumidor bajo la ley austríaca.
    termination:
      title: Terminación del Servicio
      text1: Puedes dejar de usar el servicio en cualquier momento eliminando tu cuenta.
      text2: 'Nos reservamos el derecho de:'
      item1: Suspender o terminar tu cuenta por violación de los términos
      item2: Modificar o discontinuar el servicio con aviso razonable
    changes:
      title: Cambios en los Términos
      text1: Nos reservamos el derecho de modificar estos términos en cualquier momento.
        Los cambios significativos se publicarán en el sitio web.
      text2: El uso continuado del servicio después de los cambios se considerará
        aceptación de los nuevos términos.
    law:
      title: Ley Aplicable
      text1: Estos términos de servicio se rigen por las leyes de la República de
        Austria.
      text2: Los tribunales de Austria tienen jurisdicción para la resolución de disputas,
        a menos que las disposiciones obligatorias de protección al consumidor dispongan
        lo contrario.
