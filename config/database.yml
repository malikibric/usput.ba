# PostgreSQL configuration
#
# Production uses DATABASE_URL environment variable for primary database,
# QUEUE_DATABASE_URL for Solid Queue, and PLATFORM_DATABASE_URL for Platform AI
# (with pgvector support for semantic search).
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    <% if ENV["PROD_DATABASE_URL"] %>
    url: <%= ENV["PROD_DATABASE_URL"] %>
    <% else %>
    database: klosaer_development
    username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
    password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
    host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
    port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
    <% end %>
  queue:
    <<: *default
    <% if ENV["PROD_QUEUE_DATABASE_URL"] %>
    url: <%= ENV["PROD_QUEUE_DATABASE_URL"] %>
    <% else %>
    database: klosaer_queue_development
    username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
    password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
    host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
    port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
    <% end %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>
    migrations_paths: db/queue_migrate
  platform:
    <<: *default
    <% if ENV["PROD_PLATFORM_DATABASE_URL"] %>
    url: <%= ENV["PROD_PLATFORM_DATABASE_URL"] %>
    <% else %>
    database: klosaer_platform_development
    username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
    password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
    host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
    port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
    <% end %>
    migrations_paths: db/platform_migrate

test:
  primary:
    <<: *default
    database: klosaer_test
    username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
    password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
    host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
    port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
  queue:
    <<: *default
    database: klosaer_queue_test
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>
    username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
    password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
    host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
    port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
    migrations_paths: db/queue_migrate
  platform:
    <<: *default
    database: klosaer_platform_test
    username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
    password: <%= ENV.fetch("POSTGRES_PASSWORD") { "" } %>
    host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
    port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
    migrations_paths: db/platform_migrate

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  queue:
    <<: *default
    url: <%= ENV["QUEUE_DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>
    migrations_paths: db/queue_migrate
  platform:
    <<: *default
    url: <%= ENV["PLATFORM_DATABASE_URL"] %>
    migrations_paths: db/platform_migrate
